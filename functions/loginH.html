<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .login-title {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: #666;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            color: #444;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .form-hint {
            font-size: 13px;
            color: #888;
            margin-top: 6px;
            display: block;
        }
        
        .form-actions {
            margin-top: 30px;
        }
        
        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .button-icon {
            font-size: 18px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .message-box {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-title {
                font-size: 24px;
            }
            
            .form-input {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1 class="login-title">管理员登录</h1>
                <p class="login-subtitle">请输入验证信息以获取管理权限</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="contact" class="form-label">联系方式</label>
                    <input type="text" id="contact" class="form-input" 
                           placeholder="邮箱或手机号" required>
                </div>
                
                <div class="form-group">
                    <label for="hash" class="form-label">验证哈希</label>
                    <input type="password" id="hash" class="form-input" 
                           placeholder="格式: xxxx-xxxx-xxxx" required>
                    <span class="form-hint">请输入完整的校验码，区分大小写</span>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="loginBtn" class="login-button">
                        <span class="button-icon">→</span>
                        <span>登录验证</span>
                    </button>
                </div>
            </form>
            
            <div id="messageBox" class="message-box"></div>
            
            <a href="../index.html" class="back-link">← 返回主页面</a>
        </div>
    </div>
    
    <!-- SHA-512 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha512/0.8.0/sha512.min.js"></script>
    
    <script>
        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，开始初始化...');
            
            const loginBtn = document.getElementById('loginBtn');
            const contactInput = document.getElementById('contact');
            const hashInput = document.getElementById('hash');
            const messageBox = document.getElementById('messageBox');
            
            if (!loginBtn) {
                console.error('登录按钮未找到！');
                return;
            }
            
            console.log('登录按钮找到:', loginBtn);
            console.log('SHA512 库:', typeof sha512);
            
            // 显示消息函数
            function showMessage(message, type = 'info') {
                messageBox.textContent = message;
                messageBox.className = 'message-box message-' + type;
                messageBox.style.display = 'block';
            }
            
            // 隐藏消息
            function hideMessage() {
                messageBox.style.display = 'none';
            }
            
            // 登录按钮点击事件
            loginBtn.onclick = async function() {
                console.log('登录按钮被点击');
                
                const contact = contactInput.value.trim();
                const hash = hashInput.value.trim();
                
                // 验证输入
                if (!contact) {
                    showMessage('请输入联系方式', 'error');
                    contactInput.focus();
                    return;
                }
                
                if (!hash) {
                    showMessage('请输入验证哈希', 'error');
                    hashInput.focus();
                    return;
                }
                
                // 清理哈希输入
                const cleanHash = hash.replace(/\s/g, '');
                
                // 计算 SHA-512
                let hashDigest;
                try {
                    if (typeof sha512 !== 'function') {
                        throw new Error('SHA512 库未正确加载');
                    }
                    hashDigest = sha512(cleanHash);
                    console.log('计算后的哈希:', hashDigest);
                } catch (error) {
                    console.error('SHA512 计算失败:', error);
                    showMessage('加密计算失败: ' + error.message, 'error');
                    return;
                }
                
                // 验证哈希
                const ADMIN_HASH = '24447aceeeb54044bdee94742ddbc8fb9d3d2c948b59217e0c72356c6738746d38c4108a21890cec7df1cd857df6705444f1b7a0034147d40b4a2fea4d5253f';
                
                if (hashDigest !== ADMIN_HASH) {
                    showMessage('验证失败：校验码不正确', 'error');
                    return;
                }
                
                // 本地验证通过
                showMessage('本地验证通过，正在连接服务器...', 'info');
                
                // 调用后端 API
                try {
                    const response = await fetch('/.netlify/functions/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contact: contact,
                            hash: hashDigest,
                            timestamp: new Date().toISOString()
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // 存储登录状态
                        localStorage.setItem('adminHash', hashDigest);
                        localStorage.setItem('adminContact', contact);
                        localStorage.setItem('adminLoginTime', Date.now());
                        
                        showMessage('登录成功！正在跳转...', 'success');
                        
                        // 2秒后跳转
                        setTimeout(() => {
                            window.location.href = '../index.html';
                        }, 2000);
                    } else {
                        showMessage('服务器验证失败: ' + (data.message || '未知错误'), 'error');
                    }
                } catch (error) {
                    console.warn('API 调用失败，启用本地模式:', error);
                    
                    // 降级到本地模式
                    localStorage.setItem('adminHash', hashDigest);
                    localStorage.setItem('adminContact', contact);
                    localStorage.setItem('adminLoginTime', Date.now());
                    localStorage.setItem('offlineMode', 'true');
                    
                    showMessage('服务器连接失败，已启用本地模式', 'info');
                    
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                }
            };
            
            // 检查是否已登录
            const savedHash = localStorage.getItem('adminHash');
            if (savedHash) {
                const savedContact = localStorage.getItem('adminContact');
                if (savedContact) {
                    contactInput.value = savedContact;
                    showMessage('检测到已保存的登录信息，可直接验证', 'info');
                }
            }
            
            // 表单回车提交
            hashInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });
            
            console.log('登录页面初始化完成');
        });
    </script>
</body>
</html>
